allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

subprojects {
    def setNamespace = { prj ->
        if (prj.hasProperty('android')) {
            if (prj.android.namespace == null) {
                prj.android.namespace = prj.group
            }
        }
    }
    if (project.state.executed) {
        setNamespace(project)
    } else {
        project.afterEvaluate { setNamespace(it) }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}